name: AI Readiness

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: test -s docs/ai/README.md
      - run: test -s docs/ai/prompt-registry.md
      - run: test -s docs/ai/evals/agent-os.jsonl
