name = "agent-os"
main = "src/index.ts"
compatibility_date = "2025-04-16"
compatibility_flags = ["nodejs_compat"]

# Cron schedules — see src/cron.ts for the dispatcher.
[triggers]
crons = ["*/15 * * * *"]

# KV namespace backing the rate limiter. Create your own and paste its id:
#   wrangler kv namespace create RATE_LIMIT_KV
# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = "<your-kv-namespace-id>"

# Secrets are NOT stored here. Set them with `wrangler secret put`:
#   SUPABASE_URL, SUPABASE_SERVICE_KEY, ADMIN_TOKEN,
#   TELEGRAM_BOT_TOKEN, TELEGRAM_WEBHOOK_SECRET
